name: Run Tests

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build and start Docker containers
        run: docker compose up -d --build

      - name: Wait for services
        run: |
          echo "Waiting 5 seconds for Redis"
          sleep 10

      - name: Install Composer dependencies inside container
        run: docker compose exec app composer install --no-interaction --prefer-dist

      - name: Test Redis connection
        run: docker compose exec app php -r "var_dump((new Predis\Client(['host' => 'redis']))->ping());"
      
      - name: Run tests inside container
        run: docker compose exec app vendor/bin/phpunit

      - name: Tear down Docker containers
        run: docker compose down